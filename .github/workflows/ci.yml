name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Avoid piling up redundant runs (and redundant failure emails) on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # The platform test suite (tests/app) needs only signal/crypto/web deps —
      # not the heavy torch/diffusers stack (those are used lazily by optional
      # adapters and skipped when absent), so CI stays fast and reliable.
      - name: Install platform test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy scipy pillow opencv-python-headless PyWavelets scikit-image imageio \
            cryptography reedsolo pynacl \
            sqlalchemy \
            fastapi "uvicorn[standard]" pydantic pydantic-settings python-multipart httpx \
            pytest pytest-cov

      - name: Run platform tests
        run: pytest tests/app -q --cov=app --cov-report=term-missing

  lint:
    name: lint (informational)
    runs-on: ubuntu-latest
    # Never fails the build — style findings should not trigger failure emails.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: Ruff (report only)
        run: ruff check app tests/app || true
